<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Labyrinth" />
  <meta name="description" content="A fun tilt-to-play labyrinth ball game for kids. Tilt your device to roll the ball through the maze!" />
  <title>Labyrinth — Tilt & Roll!</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Game Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- HOME SCREEN —  game hub -->
  <div id="homeScreen" class="screen active">
    <div class="home-content">
      <div class="home-logo">
        <h1 id="homeTitle" class="home-title">🎮 Leikjaland</h1>
        <p id="homeSub" class="home-sub">Veldu leik!</p>
      </div>
      <div class="home-games">
        <button id="btnLabyrinth" class="game-card labyrinth-card">
          <span class="game-card-icon">🌀</span>
          <div class="game-card-text">
            <span class="game-card-name">Labyrinth</span>
            <span id="labyrinthDesc" class="game-card-desc">Halltu til að rúlla boltanum í gegnum völundarhúsið</span>
          </div>
        </button>
        <button id="btnSnake" class="game-card snake-card">
          <span class="game-card-icon">🐍</span>
          <div class="game-card-text">
            <span class="game-card-name">Snake</span>
            <span id="snakeDesc" class="game-card-desc">Klassískt Snake — borðaðu, vaxtu, hrapadu ekki</span>
          </div>
        </button>
        <button id="btnColorBook" class="game-card colorbook-card">
          <span class="game-card-icon">🎨</span>
          <div class="game-card-text">
            <span class="game-card-name">Color Book</span>
            <span id="colorBookDesc" class="game-card-desc">Teiknaðu og litu skemmtilegar myndir</span>
          </div>
        </button>
      </div>
      <button id="btnLang" class="lang-btn">EN</button>
    </div>
  </div>

  <!-- LABYRINTH LEVEL SELECT -->
  <div id="startScreen" class="screen">
    <div class="screen-content">
      <button id="btnAllGames" class="cb-back-btn" style="align-self:flex-start">← Allir leikir</button>

      <div class="logo-wrap">
        <div class="logo-ball"></div>
        <h1 class="logo-title">Labyrinth</h1>
        <p id="logoSub" class="logo-sub">Hallaðu til að rúlla! 🎉</p>
      </div>

      <div class="level-select">
        <p id="levelLabel" class="level-label">Veldu erfiðleikastig:</p>
        <div class="level-buttons">
          <button id="btnEasy" class="level-btn easy" data-level="easy">
            <span class="level-icon">🐢</span>
            <span id="easyName" class="level-name">Auðvelt</span>
            <span class="level-desc">6×6</span>
            <span id="starsEasy" class="level-stars"></span>
          </button>
          <button id="btnMedium" class="level-btn medium" data-level="medium">
            <span class="level-icon">🐇</span>
            <span id="mediumName" class="level-name">Miðlungs</span>
            <span class="level-desc">8×8</span>
            <span id="starsMedium" class="level-stars"></span>
          </button>
          <button id="btnHard" class="level-btn hard" data-level="hard">
            <span class="level-icon">🦁</span>
            <span id="hardName" class="level-name">Erfitt</span>
            <span class="level-desc">10×10</span>
            <span id="starsHard" class="level-stars"></span>
          </button>
        </div>
      </div>

      <p class="hint-text" id="hintText">Halltu tækinu til að rúlla boltanum!</p>
    </div>
  </div>

  <!-- HUD (shown while playing) -->
  <div id="hud" class="screen">
    <div class="hud-top">
      <button id="btnHome" class="hud-btn" aria-label="Home">🏠</button>
      <div class="hud-level-name" id="hudLevelName">Easy</div>
      <button id="btnMute" class="hud-btn" aria-label="Toggle sound">🔊</button>
    </div>
    <div class="hud-bottom">
      <button id="btnNewMaze" class="hud-btn-pill">🔀 Nýr völundarhús</button>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="winScreen" class="screen">
    <div class="win-content">
      <div class="win-emoji" id="winEmoji">🌟</div>
      <h2 id="winTitle" class="win-title">Frábært!</h2>
      <p class="win-sub" id="winSub">Þú fannst útganginn!</p>
      <div class="win-stars" id="winStars"></div>
      <div class="win-buttons">
        <button id="btnPlayAgain" class="win-btn primary">🔀 Nýr völundarhús</button>
        <button id="btnGoHome" class="win-btn secondary">🏠 Heim</button>
      </div>
    </div>
    <canvas id="confettiCanvas"></canvas>
  </div>

  <!-- KEYBOARD HINT (desktop only) -->
  <div id="keyboardHint" class="keyboard-hint">
    <span id="keyboardHintText">Notaðu örvalykla eða WASD til að rúlla boltanum</span>
  </div>

  <!-- GALLERY SCREEN -->
  <div id="galleryScreen" class="screen cb-screen">
    <div class="cb-header">
      <button id="btnGalleryBack" class="cb-back-btn">🏠 Heim</button>
      <h2 id="galleryTitle" class="cb-title">🎨 Litabók</h2>
      <span></span>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <!-- COLORING SCREEN -->
  <div id="coloringScreen" class="screen cb-screen">
    <div class="cb-header">
      <button id="btnColoringBack" class="cb-back-btn">← Til baka</button>
      <span class="cb-title" id="coloringTitle">Drawing</span>
      <div class="cb-header-actions">
        <button id="btnColoringClear" class="cb-action-btn" title="Clear">🗑️</button>
        <button id="btnColoringSave"  class="cb-action-btn" title="Save image">💾</button>
      </div>
    </div>
    <div id="coloringCanvasWrap" class="coloring-canvas-wrap">
      <canvas id="coloringCanvas"></canvas>
    </div>
    <div class="coloring-panel">
      <div class="panel-row">
        <div id="toolsRow" class="tools-row"></div>
        <div id="sizesRow" class="sizes-row"></div>
      </div>
      <div id="paletteGrid" class="palette-grid"></div>
    </div>
  </div>

  <!-- SNAKE SCREEN -->
  <div id="snakeScreen" class="screen snake-screen">
    <canvas id="snakeCanvas"></canvas>
    <div class="snake-hud">
      <button id="btnSnakeHome" class="hud-btn" aria-label="Home">🏠</button>
      <div class="snake-hud-score">
        <span id="snakeScore">Score: 0</span>
        <span id="snakeBest">Best: 0</span>
      </div>
      <button id="btnSnakePause" class="hud-btn" aria-label="Pause">⏸</button>
    </div>
    <div id="snakeOverlay" class="snake-overlay">
      <div class="snake-over-content">
        <div class="snake-over-emoji">🐍</div>
        <h2 id="snakeOverTitle" class="snake-over-title">Leik lokið!</h2>
        <p id="snakeFinalScore" class="snake-over-score">Stig: 0</p>
        <p id="snakeNewBest" class="snake-new-best">🎉 Nýtt met!</p>
        <div class="snake-over-buttons">
          <button id="btnSnakeRestart" class="win-btn primary">🔄 Spila aftur</button>
          <button id="btnSnakeOverHome" class="win-btn secondary">🏠 Heim</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
